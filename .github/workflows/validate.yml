name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repo manifest and skills
        run: python3 scripts/validate_repo.py

      - name: Check helper scripts
        run: |
          chmod +x scripts/fetch-skill.sh scripts/list-skills.sh
          ./scripts/list-skills.sh
          (cd /tmp && "$GITHUB_WORKSPACE/scripts/fetch-skill.sh" rag-security >/dev/null)
